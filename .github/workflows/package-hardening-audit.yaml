---
# SPDX-License-Identifier: Apache-2.0
# SPDX-FileCopyrightText: 2026 The Linux Foundation

# Package manager hardening audit (pilot).
#
# Runs the reusable hardening-audit composite action from
# jordanconway/package-manager-hardening against this repository and
# publishes a findings table with remediation hints to the job summary.
# The action and its scripts are Python-stdlib-only, so there is no
# install step and the egress allow-list stays minimal.
#
# Soft-adoption mode (warn-only: true): the audit reports without
# failing the job. Drop warn-only once the findings are triaged to make
# it a required check.
#
# Pilot only: the wider rollout will live centrally in
# lfreleng-actions/.github and be enforced org-wide via a repository
# ruleset rather than copying this file into every repository. The
# workflow is deliberately self-contained (inline egress allow-list) so
# it ports cleanly into that central, cross-repository form.
name: 'Package Hardening Audit'

# yamllint disable-line rule:truthy
on:
  workflow_dispatch:
  pull_request:
    types: [opened, reopened, synchronize]
  push:
    branches:
      - main
  schedule:
    - cron: '23 8 * * 1'  # weekly, Monday 08:23 UTC

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

permissions: {}

jobs:
  hardening-audit:
    name: 'Audit package manager hardening'
    runs-on: 'ubuntu-latest'
    permissions:
      contents: read
    timeout-minutes: 5
    steps:
      - name: 'Harden runner (block)'
        # yamllint disable-line rule:line-length
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: 'block'
          allowed-endpoints: >
            api.github.com:443
            github.com:443
            objects.githubusercontent.com:443

      # yamllint disable-line rule:line-length
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      # Pinned to the v0.4.0 release commit (the commit SHA, not the
      # annotated tag object). Bump via the release tag's commit SHA.
      - name: 'Run package manager hardening audit'
        # yamllint disable-line rule:line-length
        uses: jordanconway/package-manager-hardening@d8fa235d84827241a45a0f08ff21b815ffaf871c  # v0.4.0
        with:
          path: '.'
          warn-only: 'true'
