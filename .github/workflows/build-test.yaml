---
# SPDX-License-Identifier: Apache-2.0
# SPDX-FileCopyrightText: 2025 The Linux Foundation

# Runs on a new pull request, performs build and runs tests
name: 'Python Build/Test'

# yamllint disable-line rule:truthy
on:
  workflow_dispatch:
    inputs:
      clear_cache:
        description: 'Clear all Python dependency caches'
        type: boolean
        default: false
        required: false
  pull_request:
    types: [opened, reopened, synchronize]
    branches:
      - main
      - master
    paths:
      - '**'
      - '!.github/**'
      - '!.*'
      - '!tox.ini'

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

permissions: {}

jobs:
  repository-metadata:
    name: "Repository Metadata"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    timeout-minutes: 5
    steps:
      # yamllint disable-line rule:line-length
      - uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df  # v2.18.0
        with:
          egress-policy: audit

      # yamllint disable-line rule:line-length
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0

      - name: "Gather repository metadata"
        id: repo-metadata
        # yamllint disable-line rule:line-length
        uses: lfreleng-actions/repository-metadata-action@ceabcd987d13d7bfefd2372e01eebb0ddac45956  # v0.2.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          github_summary: 'true'
          gerrit_summary: 'false'
          artifact_upload: 'true'
          artifact_formats: 'json'

  clear-cache:
    name: 'Clear Python Caches'
    # Only runs on manual dispatch with clear_cache enabled
    if: >-
      github.event_name == 'workflow_dispatch'
      && github.event.inputs.clear_cache == 'true'
    runs-on: ubuntu-latest
    permissions:
      actions: write  # Required for gh cache delete
    timeout-minutes: 5
    env:
      GH_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
    steps:
      # yamllint disable-line rule:line-length
      - uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df  # v2.18.0
        with:
          egress-policy: 'audit'

      - name: 'Clear Python dependency caches'
        env:
          REPO: "${{ github.repository }}"
        run: |
          # Clear Python dependency caches (scoped to Python key prefixes)
          # Matches cache keys created by:
          #   python-*        lfreleng-actions (actions/cache)
          #   setup-python-*  actions/setup-python built-in caching
          #   setup-uv-*      astral-sh/setup-uv
          echo "Clearing Python dependency caches 🗑️"
          deleted=0
          failed=0
          for prefix in python- setup-python- setup-uv-; do
            while true; do
              if ! keys=$(gh cache list --repo "$REPO" \
                --key "$prefix" --limit 100 \
                --json key --jq '.[].key' 2>&1); then
                echo "::warning::Failed to list caches" \
                  "for prefix '$prefix': $keys"
                echo "Warning: failed to list caches for" \
                  "prefix \`$prefix\`: $keys" \
                  >> "$GITHUB_STEP_SUMMARY"
                failed=1
                break
              fi
              [ -n "$keys" ] || break

              batch_deleted=0
              while IFS= read -r key; do
                [ -n "$key" ] || continue
                if delete_out=$(gh cache delete "$key" \
                  --repo "$REPO" 2>&1); then
                  echo "Deleted cache: $key"
                  deleted=$((deleted + 1))
                  batch_deleted=$((batch_deleted + 1))
                else
                  echo "::warning::Failed to delete" \
                    "cache '$key': $delete_out"
                  echo "Warning: failed to delete cache" \
                    "\`$key\`: $delete_out" \
                    >> "$GITHUB_STEP_SUMMARY"
                  failed=1
                fi
              done <<< "$keys"

              # Stop if nothing was deleted to avoid looping
              # forever on the same result set
              [ "$batch_deleted" -gt 0 ] || break
            done
          done
          if [ "$deleted" -gt 0 ]; then
            echo "Cleared $deleted Python cache(s) ✅" \
              >> "$GITHUB_STEP_SUMMARY"
          elif [ "$failed" -eq 0 ]; then
            echo "No Python caches found to clear 💬" \
              >> "$GITHUB_STEP_SUMMARY"
          fi
          if [ "$failed" -ne 0 ]; then
            echo "Cache clearing completed with errors ❌" \
              >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

  python-build:
    name: 'Python Build'
    needs: 'clear-cache'
    # Run regardless of clear-cache outcome (success, failure, or skipped);
    if: ${{ always() && !cancelled() }}
    runs-on: 'ubuntu-latest'
    outputs:
      matrix_json: "${{ steps.python-build.outputs.matrix_json }}"
      artefact_name: "${{ steps.python-build.outputs.artefact_name }}"
      artefact_path: "${{ steps.python-build.outputs.artefact_path }}"
    permissions:
      contents: read
    timeout-minutes: 12
    steps:
      # Harden the runner used by this workflow
      # yamllint disable-line rule:line-length
      - uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df  # v2.18.0
        with:
          egress-policy: 'audit'

      # yamllint disable-line rule:line-length
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: 'Build Python project'
        id: python-build
        # yamllint disable-line rule:line-length
        uses: lfreleng-actions/python-build-action@38b9a4e7ee34e56d178f5bd248df52e41f7d496e  # v1.0.6

  python-tests:
    name: 'Python Tests'
    runs-on: 'ubuntu-latest'
    needs: 'python-build'
    if: ${{ !cancelled() && needs.python-build.result == 'success' }}
    # Matrix job
    strategy:
      fail-fast: false
      matrix: "${{ fromJson(needs.python-build.outputs.matrix_json) }}"
    permissions:
      contents: read
    timeout-minutes: 12
    steps:
      # Harden the runner used by this workflow
      # yamllint disable-line rule:line-length
      - uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df  # v2.18.0
        with:
          egress-policy: audit

      # yamllint disable-line rule:line-length
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: "Python tests [pytest] ${{ matrix.python-version }}"
        # yamllint disable-line rule:line-length
        uses: lfreleng-actions/python-test-action@82aa55cf21a6be32d8d5b365716b2b349e8058bd  # v1.0.2
        with:
          python_version: ${{ matrix.python-version }}

  python-audit:
    name: 'Python Audit'
    runs-on: 'ubuntu-latest'
    needs: 'python-build'
    if: ${{ !cancelled() && needs.python-build.result == 'success' }}
    # Matrix job
    strategy:
      fail-fast: false
      matrix: "${{ fromJson(needs.python-build.outputs.matrix_json) }}"
    permissions:
      contents: read
    timeout-minutes: 10
    steps:
      # Harden the runner used by this workflow
      # yamllint disable-line rule:line-length
      - uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df  # v2.18.0
        with:
          egress-policy: 'audit'

      # yamllint disable-line rule:line-length
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: "Audit dependencies ${{ matrix.python-version }}"
        # yamllint disable-line rule:line-length
        uses: lfreleng-actions/python-audit-action@1776538e768c52c55c3c96495f6e25f0762ad28f  # v0.2.6
        with:
          python_version: "${{ matrix.python-version }}"
          permit_fail: "${{ vars.NO_BLOCK_AUDIT_FAIL == 'true' }}"

  sbom:
    name: 'Generate SBOM'
    runs-on: ubuntu-latest
    needs: 'python-build'
    if: ${{ !cancelled() && needs.python-build.result == 'success' }}
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      # Harden the runner used by this workflow
      # yamllint disable-line rule:line-length
      - uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df  # v2.18.0
        with:
          egress-policy: 'audit'

      # yamllint disable-line rule:line-length
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: "Generate SBOM"
        id: sbom
        # yamllint disable-line rule:line-length
        uses: lfreleng-actions/python-sbom-action@ae4aca2ef28d7da4ec95049cc78be43e632d322a  # v0.1.0
        with:
          include_dev: "false"
          sbom_format: "both"

      - name: "Upload SBOM artifacts"
        # yamllint disable-line rule:line-length
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: sbom-files
          path: |
            sbom-cyclonedx.json
            sbom-cyclonedx.xml
          retention-days: 45

      - name: "SBOM summary"
        run: |
            # SBOM summary
            {
              echo "## SBOM Summary"
              echo "SBOM count: ${{ steps.sbom.outputs.component_count }}"
              echo "Tool used: ${{ steps.sbom.outputs.dependency_manager }}"
            } >> "$GITHUB_STEP_SUMMARY"

  grype:
    name: 'Grype Audit SBOM'
    runs-on: ubuntu-latest
    needs: 'sbom'
    if: ${{ !cancelled() && needs.sbom.result == 'success' }}
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      # Harden the runner used by this workflow
      # yamllint disable-line rule:line-length
      - uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df  # v2.18.0
        with:
          egress-policy: 'audit'

      - name: "Download SBOM artefact"
        # yamllint disable-line rule:line-length
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: sbom-files

      # The SARIF and JSON Grype scans below emit workflow commands
      # (::warning::Failed minimum severity level...) that the runner
      # would otherwise lift into duplicate job annotations. Wrap
      # those scans in a ::stop-commands::/::<token>:: pair so the
      # commands are logged verbatim but not surfaced as annotations.
      # Only the final Text/Table scan is left outside the pair, so
      # it is the sole source of the job's single failure annotation.
      #
      # The token is randomised per run to prevent a (malicious)
      # dependency from re-enabling workflow-command parsing
      # prematurely via a crafted log line.
      - name: "Mute annotations for artefact-only scans"
        id: mute-token
        run: |
            # Generate a per-run token and suspend workflow-command parsing
            token="grype-quiet-$(openssl rand -hex 16)"
            echo "token=${token}" >> "$GITHUB_OUTPUT"
            echo "::stop-commands::${token}"

      - name: "Security scan with Grype (SARIF)"
        # yamllint disable-line rule:line-length
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2  # v7.4.0
        id: grype-sarif
        # SARIF output is produced purely for artefact upload; this
        # step must not fail the job so the Table step below can
        # render the CVE list in its own log.
        continue-on-error: true
        with:
          sbom: "sbom-cyclonedx.json"
          output-format: "sarif"
          output-file: "grype-results.sarif"
          fail-build: "false"

      - name: "Security scan with Grype (JSON)"
        # yamllint disable-line rule:line-length
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2  # v7.4.0
        id: grype-json
        # JSON output drives the Markdown table rendered in the job
        # step summary; it must not fail the job, so fail-build is
        # false and failures are tolerated.
        continue-on-error: true
        with:
          sbom: "sbom-cyclonedx.json"
          output-format: "json"
          output-file: "grype-results.json"
          fail-build: "false"

      # Resume workflow-command parsing. Guarded by `if: always()` so
      # that even if a preceding scan step failed unexpectedly we do
      # not leave later steps in this (or any subsequent) job running
      # with commands disabled.
      - name: "Resume annotation parsing"
        if: always()
        env:
          MUTE_TOKEN: "${{ steps.mute-token.outputs.token }}"
        run: |
            # Resume workflow-command parsing
            echo "::${MUTE_TOKEN}::"

      # The Table scan owns the pass/fail verdict for the job. Its
      # step log contains the human-readable CVE table, so when this
      # step turns red in the PR Checks UI, clicking through to the
      # workflow log immediately shows the offending packages and
      # CVEs.
      #
      # The NO_BLOCK_AUDIT_FAIL repository variable (when set to
      # 'true') disables failure propagation so pull requests can
      # proceed when blocked by newly discovered CVEs in transitive
      # dependencies.
      - name: "Security scan with Grype (Text/Table)"
        # yamllint disable-line rule:line-length
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2  # v7.4.0
        id: grype-table
        if: always()
        with:
          sbom: "sbom-cyclonedx.json"
          output-format: "table"
          output-file: "grype-results.txt"
          fail-build: "${{ vars.NO_BLOCK_AUDIT_FAIL != 'true' }}"

      - name: "Upload Grype scan results"
        # yamllint disable-line rule:line-length
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        if: always()
        with:
          name: grype-scan-results
          path: |
            grype-results.sarif
            grype-results.json
            grype-results.txt
          retention-days: 90
          if-no-files-found: warn

      - name: "Grype summary"
        if: always()
        run: |
            # Render a Markdown table of Grype matches in the job
            # step summary. The CVE data is sourced from the JSON
            # scan output (grype-results.json) and processed with
            # jq so that multi-word cells cannot accidentally break
            # the Markdown table column layout. Any literal pipe
            # characters present in cell content are escaped.
            {
              echo "## Grype Vulnerability Scan"
              echo ""
              if [ ! -f grype-results.json ]; then
                echo "No scan results available"
                exit 0
              fi
              match_count=$(jq '.matches | length' grype-results.json)
              if [ "${match_count}" = "0" ]; then
                echo "No vulnerabilities found at or above the" \
                  "configured severity threshold."
                exit 0
              fi
              echo "Found ${match_count} matching Grype record(s)."
              echo ""
              echo "| Package | Installed | Fixed In | Type |" \
                "Vulnerability | Severity | EPSS | Risk |"
              echo "| --- | --- | --- | --- | --- | --- | --- | --- |"
              jq -r '
                def esc: tostring | gsub("\\|"; "\\|");
                # Round a numeric value to two decimal places
                # using half-up rounding via jq built-in `round`.
                def round2: (. * 100 | round) / 100;
                def epss_pct:
                  ( .vulnerability.epss // [] ) as $e
                  | if ($e | length) == 0 then "-"
                    else ( $e[0].epss // 0 ) as $p
                      | if $p == 0 then "0%"
                        elif ($p * 100) < 0.01 then "<0.01%"
                        else ( ($p * 100) | round2 | tostring
                               + "%" ) end
                    end;
                def risk_fmt:
                  .vulnerability.risk
                  | if . == null then "-"
                    elif type == "number" then
                      (round2 | tostring)
                    else (. | tostring) end;
                .matches[] |
                [ (.artifact.name // "-" | esc),
                  (.artifact.version // "-" | esc),
                  ( ( .vulnerability.fix.versions // [] )
                    | if length == 0 then "-"
                      else join(", ") end | esc ),
                  (.artifact.type // "-" | esc),
                  (.vulnerability.id // "-" | esc),
                  (.vulnerability.severity // "-" | esc),
                  epss_pct,
                  risk_fmt
                ] | "| " + join(" | ") + " |"
              ' grype-results.json
            } >> "$GITHUB_STEP_SUMMARY"
